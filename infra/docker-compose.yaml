services:
  mongodb:
    # Atlas Local: MongoDB + Atlas Search + Vector Search in a single container
    image: mongodb/mongodb-atlas-local:latest
    container_name: salesai-mongodb
    ports:
      - '27017:27017'
    volumes:
      - mongodata:/data/db

  redis:
    image: redis:7-alpine
    container_name: salesai-redis
    ports:
      - '6380:6379'
    volumes:
      - redisdata:/data

  minio:
    image: minio/minio:latest
    container_name: salesai-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - '9000:9000'
      - '9001:9001'
    volumes:
      - miniodata:/data

  qdrant:
    image: qdrant/qdrant:latest
    container_name: salesai-qdrant
    ports:
      - '6333:6333'
      - '6334:6334'
    volumes:
      - qdrantdata:/qdrant/storage

  livekit:
    image: livekit/livekit-server:latest
    container_name: salesai-livekit
    # node-ip is the address advertised to clients for WebRTC media (ICE).
    # 127.0.0.1 works for same-machine browser testing; export LIVEKIT_NODE_IP
    # with the host's LAN IP to test from phones/other devices.
    command: --dev --bind 0.0.0.0 --node-ip ${LIVEKIT_NODE_IP:-127.0.0.1}
    ports:
      - '7880:7880'
      - '7881:7881'
      - '7882:7882/udp'
    environment:
      LIVEKIT_KEYS: 'devkey: secret'

  # ─── Phase 7: Observability ────────────────────────────────────
  jaeger:
    # All-in-one: collector + storage (in-memory) + query UI in a single
    # container — fine for local/demo use; a real deployment would swap the
    # storage backend, not the collector.
    image: jaegertracing/all-in-one:latest
    container_name: salesai-jaeger
    ports:
      - '16686:16686' # web UI
      - '4317:4317'   # OTLP gRPC receiver
      - '4318:4318'   # OTLP HTTP receiver
    environment:
      COLLECTOR_OTLP_ENABLED: 'true'

  prometheus:
    image: prom/prometheus:latest
    container_name: salesai-prometheus
    ports:
      - '9090:9090'
    volumes:
      - ../infra/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - promdata:/prometheus
    # apps run on the host (npm run dev), not in this compose file, so
    # Prometheus needs a route back out to the host to scrape /metrics.
    extra_hosts:
      - 'host.docker.internal:host-gateway'

  grafana:
    image: grafana/grafana:latest
    container_name: salesai-grafana
    ports:
      - '3001:3000'
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: 'true'
      GF_AUTH_ANONYMOUS_ORG_ROLE: 'Admin'
    volumes:
      - ../infra/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafanadata:/var/lib/grafana
    depends_on:
      - prometheus

volumes:
  mongodata:
  redisdata:
  miniodata:
  qdrantdata:
  promdata:
  grafanadata:
