services:
  mongodb:
    # Atlas Local: MongoDB + Atlas Search + Vector Search in a single container
    image: mongodb/mongodb-atlas-local:latest
    container_name: salesai-mongodb
    ports:
      - '27017:27017'
    volumes:
      - mongodata:/data/db

  redis:
    image: redis:7-alpine
    container_name: salesai-redis
    ports:
      - '6379:6379'
    volumes:
      - redisdata:/data

  minio:
    image: minio/minio:latest
    container_name: salesai-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - '9000:9000'
      - '9001:9001'
    volumes:
      - miniodata:/data

  qdrant:
    image: qdrant/qdrant:latest
    container_name: salesai-qdrant
    ports:
      - '6333:6333'
      - '6334:6334'
    volumes:
      - qdrantdata:/qdrant/storage

  livekit:
    image: livekit/livekit-server:latest
    container_name: salesai-livekit
    command: --dev --bind 0.0.0.0
    ports:
      - '7880:7880'
      - '7881:7881'
      - '7882:7882/udp'
    environment:
      LIVEKIT_KEYS: 'devkey: secret'

volumes:
  mongodata:
  redisdata:
  miniodata:
  qdrantdata:
